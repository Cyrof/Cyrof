name: Generate README Stats

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create stats directory
        run: mkdir -p dist/stats

      - name: Generate GitHub stats card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: "username=Cyrof&theme=radical&show_icons=true&hide_border=true&count_private=true&hide=prs,issues"
          path: dist/stats/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: "username=Cyrof&theme=radical&layout=compact&hide_border=true&count_private=false&hide=Jupyter%20Notebook,HTML&exclude_repo=html-assignment&langs_count=6&card_width=420"
          path: dist/stats/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show generated files
        run: ls -lah dist/stats

      - name: Push stats files to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist/stats
          destination_dir: stats
          keep_files: true
